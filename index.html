<html>
  <head>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h3>HOME</h3>
        <div class="score-display" id="home-score">12</div>
        <div>
          <button class="add-score-btn" onclick="addOneHome()">+1</button>
          <button class="add-score-btn" onclick="addTwoHome()">+2</button>
          <button class="add-score-btn" onclick="addThreeHome()">+3</button>
        </div>
      </div>
      <div>
        <h3>AWAY</h3>
        <div class="score-display" id="guest-score">5</div>
        <div>
          <button class="add-score-btn" onclick="addOneGuest()">+1</button>
          <button class="add-score-btn" onclick="addTwoGuest()">+2</button>
          <button class="add-score-btn" onclick="addThreeGuest()">+3</button>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
